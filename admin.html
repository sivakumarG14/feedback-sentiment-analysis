<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <title>Student Feedback Analytics</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #f3f5fb;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 1300px;
            margin: auto;
            padding: 40px 20px;
        }

        h1 {
            text-align: center;
            margin-bottom: 25px;
            color: #333;
        }

        button {
            display: block;
            margin: auto;
            margin-bottom: 30px;
            padding: 12px 30px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(90deg, #5a6df0, #4a8df0);
            color: white;
            cursor: pointer;
        }

        button:hover {
            transform: scale(1.03);
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 35px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.08);
            text-align: center;
        }

        .stat-number {
            font-size: 30px;
            font-weight: 600;
            margin-top: 5px;
        }

        .stat-positive {
            color: #4CAF50;
        }

        .stat-negative {
            color: #f44336;
        }

        .stat-neutral {
            color: #FFC107;
        }

        .stat-total {
            color: #4a6cf7;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.08);
            min-height: 350px;
        }

        .list-card {
            min-height: 300px;
        }

        .card-wide {
            grid-column: 1 / -1;
        }

        .card h3 {
            margin-top: 0;
            margin-bottom: 15px;
        }

        .chart-container {
            height: 260px;
        }

        ul {
            padding-left: 18px;
            max-height: 260px;
            overflow: auto;
        }

        li {
            margin-bottom: 8px;
        }

        @media(max-width:900px) {

            .stats {
                grid-template-columns: 1fr 1fr;
            }

            .grid {
                grid-template-columns: 1fr;
            }

            .card-wide {
                grid-column: auto;
            }

        }
    </style>

</head>

<body>

    <div class="container">

        <h1>Student Feedback Analytics Dashboard</h1>

        <button onclick="loadStats()">Load Dashboard</button>

        <div class="stats">

            <div class="stat-card">
                <div>Total Feedback</div>
                <div id="totalCount" class="stat-number stat-total">0</div>
            </div>

            <div class="stat-card">
                <div>Positive</div>
                <div id="positiveCount" class="stat-number stat-positive">0</div>
            </div>

            <div class="stat-card">
                <div>Negative</div>
                <div id="negativeCount" class="stat-number stat-negative">0</div>
            </div>

            <div class="stat-card">
                <div>Neutral</div>
                <div id="neutralCount" class="stat-number stat-neutral">0</div>
            </div>

        </div>


        <div class="grid">

            <div class="card">
                <h3>Sentiment Distribution</h3>
                <div class="chart-container">
                    <canvas id="pieChart"></canvas>
                </div>
            </div>

            <div class="card">
                <h3>Sentiment Comparison</h3>
                <div class="chart-container">
                    <canvas id="barChart"></canvas>
                </div>
            </div>

            <div class="card list-card">
                <h3>Top Negative Feedback</h3>
                <ul id="negativeList"></ul>
            </div>

            <div class="card list-card">
                <h3>Negative Complaint Keywords</h3>
                <ul id="negativeKeywords"></ul>
            </div>

            <div class="card list-card">
                <h3>Positive Insights</h3>
                <ul id="positiveKeywords"></ul>
            </div>

            <div class="card card-wide">
                <h3>Sentiment Trend Over Time</h3>
                <div class="chart-container">
                    <canvas id="trendChart"></canvas>
                </div>
            </div>

        </div>

        <button onclick="adminLogout()" style="background:linear-gradient(90deg,#f05a5a,#f04a4a);">Logout</button>

    </div>

    <script>

        // ADMIN AUTH GUARD
        const adminUser = localStorage.getItem("adminUser");

        if (!adminUser) {
            alert("Access denied. Please login as admin.");
            window.location = "admin-login.html";
        }

        function adminLogout() {
            localStorage.removeItem("adminUser");
            window.location = "admin-login.html";
        }

    </script>

    <script src="admin.js"></script>

</body>

</html>
